<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සිංහල ලිපිය - කියවීමට පහසු සැකසුම</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        /* මූලික සැකසුම් */
        body {
            font-family: 'Noto Sans Sinhala', sans-serif;
            line-height: 1.8; /* පේළි අතර පරතරය වැඩි කර ඇත */
            color: #333;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
        }

        /* ලිපිය පවතින කොටස (Container) */
        .article-container {
            max-width: 800px; /* කියවීමට පහසුම පළල */
            margin: 40px auto;
            background-color: #ffffff;
            padding: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 8px;
        }

        /* මාතෘකාව */
        h1 {
            font-weight: 700;
            color: #1a1a1a;
            font-size: 2.5rem;
            line-height: 1.3;
            margin-bottom: 20px;
        }

        /* උප මාතෘකා */
        h2 {
            border-left: 5px solid #007bff;
            padding-left: 15px;
            margin-top: 35px;
            color: #2c3e50;
        }

        /* ඡේද (Paragraphs) */
        p {
            font-size: 1.15rem;
            margin-bottom: 20px;
            text-align: justify; /* දෙපස සමපාත කිරීම */
        }

        /* රූප සටහන් */
        .featured-image {
            width: 100%;
            height: auto;
            border-radius: 5px;
            margin-bottom: 30px;
        }

        /* දිනය සහ කතෘ */
        .meta-info {
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        /* ජංගම දුරකථන සඳහා වෙනස්කම් */
        @media (max-width: 600px) {
            .article-container {
                margin: 10px;
                padding: 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <article class="article-container">
        <h1>අප්‍රේල් මාසයට අදාළව තෙල් ඇණවුම් සියල්ල ස්ථීර කර අවසන්. </h1>

        <div class="meta-info">
            පළ කළේ: 2026 මාර්තු 19 | කතෘ: ලේඛක මණ්ඩලය
        </div>

        <img src="https://scontent-bom2-1.xx.fbcdn.net/v/t51.82787-15/654198734_17931588495210072_1483713738799895198_n.webp?stp=dst-jpg_s720x720_tt6&_nc_cat=1&ccb=1-7&_nc_sid=13d280&_nc_eui2=AeH6oJcqeHRklQRZkEGLSRP3JlHiXjVqhuwmUeJeNWqG7FAqtNLFVwuVwXUG1XnStDQiubUmuqcQupApV_PWAWuZ&_nc_ohc=SeMNvJUfpQkQ7kNvwEGdzA1&_nc_oc=Adqe_UpczTv2rmh-EWjgzyC8d0pQK6tYpyOjK1aoQHtW1XcO1xU5Tezolp7czfQXxTk&_nc_zt=23&_nc_ht=scontent-bom2-1.xx&_nc_gid=jAj-0HTMzAtNrw4ig5ZxSA&_nc_ss=8&oh=00_Afy_5chffGeoiUHsWsnP1Ky7RuH9wxX7UEyP4uW4IMO5pw&oe=69C1BDFE" alt="Sri Lanka Landscape" class="featured-image">

        <p>
           "4 වෙනි මාසය දක්වා නැව් ස්ථීර කරලා තියෙන්නේ. ඒ අනුව ගත්තහම දැන් ඊළඟ මාසයේ අවසානය වෙනතුරු ස්ථීර වශයෙන්ම තෙල් සංචිත අපිට ලැබෙමින් පවතිනවා."" - ලංකා ඛණිජ තෙල් නීතිගත සංස්ථාව
        </p>

        

    </article>

</body>
</html>
